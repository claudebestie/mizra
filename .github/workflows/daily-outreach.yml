name: Daily Outreach

on:
  # FULLY DISABLED — All outreach stopped. No trigger possible.
  # schedule:
  #   - cron: '0 7 * * 0-4'
  # workflow_dispatch: {}

jobs:
  outreach:
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r growth/requirements.txt

      - name: Run outreach (new contacts)
        working-directory: growth
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          WATI_TOKEN: ${{ secrets.WATI_TOKEN }}
          WATI_BASE_URL: ${{ secrets.WATI_BASE_URL }}
          MAX_EMAIL_PER_DAY: '200'
          DELAY_SECONDS: '3'
        run: python mizra_growth_v2.py

      - name: Run follow-ups (R1 email J+5, R2 WA J+12)
        working-directory: growth
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          WATI_TOKEN: ${{ secrets.WATI_TOKEN }}
          WATI_BASE_URL: ${{ secrets.WATI_BASE_URL }}
          MAX_EMAIL_PER_DAY: '200'
          DELAY_SECONDS: '3'
        run: python mizra_growth_v2.py --followups
