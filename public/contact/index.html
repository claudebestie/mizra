<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Contact | Mizra — צור קשר</title>
<meta name="description" content="Contact Mizra for professional website creation services. Email us or fill out the contact form.">
<link rel="canonical" href="https://getmizra.com/contact/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<style>
.contact-form{max-width:520px;margin:32px 0}
.contact-form label{display:block;font-size:.88rem;color:var(--navy);font-weight:500;margin-bottom:6px}
.contact-form input,.contact-form textarea{width:100%;padding:11px 14px;border:1px solid var(--bd);border-radius:7px;font-family:var(--sn);font-size:.92rem;background:var(--white);margin-bottom:16px;box-sizing:border-box}
.contact-form input:focus,.contact-form textarea:focus{outline:none;border-color:var(--or)}
.contact-form textarea{min-height:120px;resize:vertical}
.contact-form button{padding:14px 32px;background:var(--or);color:#fff;border:none;border-radius:8px;font-family:var(--sn);font-weight:600;font-size:.95rem;cursor:pointer;transition:background .2s}
.contact-form button:hover{background:var(--or2)}
.contact-info{margin:32px 0;padding:24px;background:var(--bg2);border-radius:12px}
.contact-info p{color:var(--tx);line-height:1.8;margin:0}
.contact-info a{color:var(--or);text-decoration:none}
</style>
</head>
<body data-shared>

<section class="sec" style="padding-top:120px">
<div class="cx" style="max-width:720px">

<div class="en">
<h1 style="font-family:var(--sf);font-size:clamp(1.8rem,3.5vw,2.6rem);color:var(--navy);margin-bottom:16px">Contact Us</h1>
<p style="color:var(--tx);line-height:1.7;margin-bottom:24px">Have a question or ready to get started? Reach out and we'll get back to you within 24 hours.</p>

<div class="contact-info">
<p><strong>Email:</strong> <a href="mailto:hello@getmizra.com">hello@getmizra.com</a></p>
</div>

<form class="contact-form" action="https://formsubmit.co/hello@getmizra.com" method="POST">
<label for="name">Your Name</label>
<input type="text" id="name" name="name" required placeholder="John Doe">

<label for="business">Business Name</label>
<input type="text" id="business" name="business" placeholder="My Restaurant">

<label for="email">Email</label>
<input type="email" id="email" name="email" required placeholder="you@example.com">

<label for="message">Message</label>
<textarea id="message" name="message" required placeholder="Tell us about your project..."></textarea>

<input type="hidden" name="_subject" value="New contact from getmizra.com">
<button type="submit">Send Message</button>
</form>
</div>

<div class="he">
<h1 style="font-family:var(--sf);font-size:clamp(1.8rem,3.5vw,2.6rem);color:var(--navy);margin-bottom:16px">צור קשר</h1>
<p style="color:var(--tx);line-height:1.7;margin-bottom:24px">יש שאלה או מוכנים להתחיל? פנו אלינו ונחזור אליכם תוך 24 שעות.</p>

<div class="contact-info">
<p><strong>אימייל:</strong> <a href="mailto:hello@getmizra.com">hello@getmizra.com</a></p>
</div>

<form class="contact-form" action="https://formsubmit.co/hello@getmizra.com" method="POST">
<label for="name-he">שם</label>
<input type="text" id="name-he" name="name" required placeholder="ישראל ישראלי">

<label for="business-he">שם העסק</label>
<input type="text" id="business-he" name="business" placeholder="המסעדה שלי">

<label for="email-he">אימייל</label>
<input type="email" id="email-he" name="email" required placeholder="you@example.com">

<label for="message-he">הודעה</label>
<textarea id="message-he" name="message" required placeholder="ספרו לנו על הפרויקט שלכם..."></textarea>

<input type="hidden" name="_subject" value="פנייה חדשה מ-getmizra.com">
<button type="submit">שלח הודעה</button>
</form>
</div>

</div>
</section>

<script src="/shared.js"></script>
</body>
</html>
