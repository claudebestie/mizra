name: Mizra Outreach — Daily Send

on:
  # Every day at 8:30 AM Israel time (UTC+3 = 5:30 UTC)
  schedule:
    - cron: "30 5 * * *"

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      whatsapp_count:
        description: "WhatsApp messages to send"
        required: false
        default: "50"
        type: string
      email_count:
        description: "Emails to send"
        required: false
        default: "50"
        type: string
      dry_run:
        description: "Dry run (no actual sends)"
        required: false
        default: "false"
        type: string

jobs:
  daily-outreach:
    name: Send daily outreach (WhatsApp + Email)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Run daily outreach
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.API_SUPABASE }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WATI_API_URL: ${{ secrets.WATI_API_URL }}
          WATI_API_TOKEN: ${{ secrets.WATI_API_TOKEN }}
          WATI_TEMPLATE_NAME: ${{ secrets.WATI_TEMPLATE_NAME }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          BREVO_SENDER_NAME: ${{ secrets.BREVO_SENDER_NAME }}
          CLOUDINARY_BASE_URL: ${{ secrets.CLOUDINARY_BASE_URL }}
          WHATSAPP_COUNT: ${{ github.event.inputs.whatsapp_count || '50' }}
          EMAIL_COUNT: ${{ github.event.inputs.email_count || '50' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node daily-outreach.js

      - name: Summary
        if: always()
        run: |
          echo "### Daily Outreach Run" >> $GITHUB_STEP_SUMMARY
          echo "- Date: $(date '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- WhatsApp target: ${{ github.event.inputs.whatsapp_count || '50' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Email target: ${{ github.event.inputs.email_count || '50' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry run: ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
