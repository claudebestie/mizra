name: Mizra — Daily Lead Pipeline

on:
  schedule:
    # 10:00 AM Israel time (UTC+3 = 7:00 UTC)
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  pipeline:
    name: Check sites → Mockup outreach → Follow-up email
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scripts/package.json

      - name: Install deps
        working-directory: scripts
        run: npm ci

      - name: Step 1 — Check sites (new leads)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node check-sites.js --limit 200

      - name: Step 2 — Mockup outreach (WhatsApp, max 50/day)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WATI_API_URL: ${{ secrets.WATI_API_URL }}
          WATI_API_KEY: ${{ secrets.WATI_API_KEY }}
          WATI_DAILY_LIMIT: "50"
        run: node mockup-outreach.js

      - name: Step 3 — Follow-up email (J+7)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node followup-email.js
