[build]
  command = "npm install && npm run build && npm run seo:check"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Trailing slash enforcement for all pages
[[redirects]]
  from = "/services/restaurants"
  to = "/services/restaurants/"
  status = 301

[[redirects]]
  from = "/services/cafes"
  to = "/services/cafes/"
  status = 301

