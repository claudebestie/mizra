name: Mizra Blog — Weekly Generation

on:
  # Every Monday at 7:00 AM Israel time (UTC+3 = 4:00 UTC)
  schedule:
    - cron: "0 4 * * 1"

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      articles_count:
        description: "Number of articles to generate"
        required: false
        default: "5"
        type: string

jobs:
  generate-blog-posts:
    name: Generate SEO articles (EN + HE)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Generate articles
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.API_CLAUDE }}
          SUPABASE_URL: ${{ secrets.API_SUPABASE }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
          ARTICLES_PER_RUN: ${{ github.event.inputs.articles_count || '5' }}
        run: node generate-articles.js

      - name: Summary
        if: always()
        run: |
          echo "### Blog Automation Run" >> $GITHUB_STEP_SUMMARY
          echo "- Date: $(date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "- Articles requested: ${{ github.event.inputs.articles_count || '5' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Languages: EN + HE" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
