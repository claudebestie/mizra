name: Daily Outreach

on:
  schedule:
    # 9:00 AM Israel time (IST = UTC+2, IDT = UTC+3)
    # Using UTC+2 (winter) = 07:00 UTC
    - cron: '0 7 * * 0-4'  # Sunday(0) to Thursday(4) at 07:00 UTC
  workflow_dispatch: {}  # Allow manual trigger from GitHub UI

jobs:
  outreach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r growth/requirements.txt

      - name: Run outreach
        working-directory: growth
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          WATI_TOKEN: ${{ secrets.WATI_TOKEN }}
          WATI_BASE_URL: ${{ secrets.WATI_BASE_URL }}
          MAX_EMAIL_PER_DAY: '200'
          DELAY_SECONDS: '3'
        run: python mizra_growth_v2.py
