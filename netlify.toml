  status = 301

# Preview pages — dynamic mockup sites for outreach
[[redirects]]
  from = "/preview/*"
  to = "/.netlify/functions/preview"
  status = 200

# Catch-all trailing slash for programmatic SEO pages
[[redirects]]
  from = "/*-website-builder"
  to = "/:splat-website-builder/"
  status = 301

[[redirects]]
  from = "/*-website-examples"
  to = "/:splat-website-examples/"
  status = 301

# Cache headers — CSS/JS use short cache with revalidation
[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/shared.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
